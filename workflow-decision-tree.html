<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GBC Workflow — What do I do next?</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel-2: #1d2230;
    --border: #2a3142;
    --text: #e7ecf3;
    --muted: #8a93a6;
    --dev: #6cc4ff;
    --review: #ffb86c;
    --qa: #c792ea;
    --po: #f1c40f;
    --done: #50c878;
    --bug: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 24px 64px; }

  header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
  header h1 { margin: 0; font-size: 22px; letter-spacing: -0.01em; }
  header .sub { color: var(--muted); font-size: 13px; }

  .breadcrumb {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    margin: 16px 0 24px;
    min-height: 28px;
    color: var(--muted); font-size: 12px;
  }
  .crumb {
    background: var(--panel); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 999px;
    color: var(--text);
  }
  .crumb-sep { opacity: 0.4; }
  .actions-bar { display: flex; gap: 8px; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-ghost:hover { background: var(--panel); }
  .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

  .question {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeIn 0.25s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .q-text { font-size: 22px; font-weight: 600; margin: 0 0 20px; line-height: 1.3; }

  .options { display: grid; gap: 10px; grid-template-columns: 1fr; }
  @media (min-width: 640px) {
    .options.cols-2 { grid-template-columns: 1fr 1fr; }
  }

  .option {
    text-align: left;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.4;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.15s, transform 0.1s, background 0.15s;
    font-family: inherit;
  }
  .option:hover { border-color: var(--dev); background: #1c2333; transform: translateX(2px); }
  .option .arrow { color: var(--muted); margin-left: auto; }
  .option .ico { font-size: 16px; }

  .result {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--dev);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 16px;
    animation: fadeIn 0.25s ease-out;
  }
  .result.dev { border-left-color: var(--dev); }
  .result.review { border-left-color: var(--review); }
  .result.qa { border-left-color: var(--qa); }
  .result.po { border-left-color: var(--po); }
  .result.done { border-left-color: var(--done); }
  .result.bug { border-left-color: var(--bug); }

  .r-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .pill {
    font-size: 11px; padding: 3px 9px; border-radius: 999px;
    background: rgba(255,255,255,0.04); color: var(--muted);
    border: 1px solid var(--border);
  }
  .pill.owner-dev { color: var(--dev); border-color: rgba(108,196,255,0.3); }
  .pill.owner-fk { color: var(--review); border-color: rgba(255,184,108,0.3); }
  .pill.owner-qa { color: var(--qa); border-color: rgba(199,146,234,0.3); }
  .pill.owner-po { color: var(--po); border-color: rgba(241,196,15,0.3); }

  .r-title { font-size: 20px; font-weight: 600; margin: 0 0 14px; }
  .r-desc { color: var(--muted); margin-bottom: 18px; }

  .checklist { list-style: none; padding: 0; margin: 0 0 18px; }
  .checklist li {
    padding: 8px 0 8px 28px;
    position: relative;
    border-bottom: 1px dashed var(--border);
  }
  .checklist li:last-child { border-bottom: 0; }
  .checklist li::before {
    content: "▸";
    position: absolute;
    left: 8px; top: 8px;
    color: var(--dev);
  }
  .checklist code {
    background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; font-size: 12.5px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .teams {
    background: #1f1f1f; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #e1e8ff; font-size: 13px; line-height: 1.5;
    white-space: pre-wrap;
    margin-bottom: 16px;
  }

  .note {
    background: rgba(241,196,15,0.06);
    border: 1px solid rgba(241,196,15,0.3);
    border-left: 3px solid var(--po);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.55;
  }
  .note .note-label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--po);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .next-q {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--dev);
    border: 1px solid var(--dev);
    color: #0a1620;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary:hover { filter: brightness(1.1); }

  .legend-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.dev { background: var(--dev); }
  .dot.review { background: var(--review); }
  .dot.qa { background: var(--qa); }
  .dot.po { background: var(--po); }
  .dot.done { background: var(--done); }
  .dot.bug { background: var(--bug); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>What do I do next?</h1>
      <div class="sub">Decision tree for the GBC ticket &amp; branch workflow.</div>
    </div>
    <div class="actions-bar">
      <button class="btn-ghost" id="back-btn">← Back</button>
      <button class="btn-ghost" id="restart-btn">↻ Start over</button>
    </div>
  </header>

  <div class="legend-row">
    <span class="badge"><span class="dot dev"></span> Developer</span>
    <span class="badge"><span class="dot review"></span> Federico</span>
    <span class="badge"><span class="dot qa"></span> QA tester</span>
    <span class="badge"><span class="dot po"></span> Jesse (PO)</span>
    <span class="badge"><span class="dot done"></span> Production</span>
    <span class="badge"><span class="dot bug"></span> Bug loop</span>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div id="stage"></div>

</div>

<script>
/* ===========================================================
   Decision tree — each node is either a question or a result.
   =========================================================== */

const TREE = {
  start: {
    type: "question",
    label: "Start",
    text: "Where are you in the workflow right now?",
    options: [
      { label: "🆕  I'm picking up a brand-new ticket", crumb: "New ticket", next: "pick_up" },
      { label: "💻  I'm done coding the feature", crumb: "Done coding", next: "after_coding" },
      { label: "🚀  I just pushed — checking sandbox deploy", crumb: "Sandbox deploy", next: "sandbox_result" },
      { label: "👀  Federico just reviewed my QA PR", crumb: "QA review", next: "qa_review" },
      { label: "🧪  QA tester finished testing in QA org", crumb: "QA result", next: "qa_result" },
      { label: "📨  My UAT PR is open / Federico reviewing it", crumb: "UAT review", next: "uat_review" },
      { label: "🌫️  QA finished smoke testing in UAT", crumb: "Smoke done", next: "after_smoke" },
      { label: "✅  Jesse / UAT acceptance is done", crumb: "UAT acceptance", next: "uat_acceptance" },
      { label: "🐞  A bug was assigned back to me", crumb: "Bug loop", next: "bug_loop" },
      { label: "🚨  My QA/UAT merge succeeded but the deploy Action FAILED", crumb: "Deploy Action failed", next: "deploy_action_failed" }
    ]
  },

  /* ---------- 1. PICK UP ---------- */
  pick_up: {
    type: "result",
    color: "dev",
    pills: [["owner-dev","Owner: Dev"], ["", "Status: Ready → Active"]],
    title: "Start the ticket properly",
    desc: "You only move the ticket to Active when you're actually starting work — not when it's assigned.",
    checklist: [
      "Move the ADO ticket from <code>Ready</code> to <code>Active</code>.",
      "Pull latest <code>PreProd</code> locally.",
      "Cut a branch named <code>feature/GBC-XXXX</code> off <code>PreProd</code>.",
      "Start coding. Use commit messages like <code>GBC-1234 - Adding field X</code>."
    ],
    nextLabel: "Done coding — what now?",
    nextNode: "after_coding"
  },

  /* ---------- 2. AFTER CODING ---------- */
  after_coding: {
    type: "result",
    color: "dev",
    pills: [["owner-dev","Owner: Dev"]],
    title: "Push & validate in your sandbox",
    desc: "Pushing the feature triggers a GitHub Action that delta-deploys (sgd) to your personal sandbox.",
    checklist: [
      "Push <code>feature/GBC-XXXX</code>.",
      "Open the GitHub Action run and <strong>wait until it finishes</strong>.",
      "Verify the Salesforce delta deploy actually succeeded — green merge ≠ green deploy.",
      "Run all tests that touch the code you changed."
    ],
    nextLabel: "Sandbox deploy result?",
    nextNode: "sandbox_result"
  },

  /* ---------- 3. SANDBOX RESULT ---------- */
  sandbox_result: {
    type: "question",
    label: "Sandbox deploy",
    text: "How did your sandbox deploy + tests go?",
    cols: 2,
    options: [
      { label: "✅  Deploy green AND tests pass", crumb: "Sandbox green", next: "open_qa_pr" },
      { label: "❌  Deploy failed OR tests failed", crumb: "Sandbox red", next: "fix_sandbox" }
    ]
  },
  fix_sandbox: {
    type: "result",
    color: "bug",
    pills: [["owner-dev","Owner: Dev"], ["", "Do NOT open a PR yet"]],
    title: "Fix it before opening any PR",
    desc: "You cannot open the QA PR until the sandbox deploy is green and the relevant tests pass.",
    checklist: [
      "Read the Action logs and fix what broke.",
      "Re-push <code>feature/GBC-XXXX</code>.",
      "Re-check the Action and re-run the tests.",
      "Only then proceed to the QA PR."
    ],
    nextLabel: "It's green now",
    nextNode: "open_qa_pr"
  },

  /* ---------- 4. OPEN QA PR ---------- */
  open_qa_pr: {
    type: "result",
    color: "review",
    pills: [["owner-fk","Owner → Federico"], ["", "Status: PR Request"]],
    title: "Open the QA PR",
    desc: "Use a per-ticket throwaway branch so the feature stays clean.",
    checklist: [
      "Create <code>QA-deploy/GBC-XXXX</code> identical to <code>feature/GBC-XXXX</code>.",
      "Open a PR: <code>QA-deploy/GBC-XXXX</code> → <code>QA</code>.",
      "Reassign the ADO ticket to <strong>Federico Kleinman</strong> and move it to <code>PR Request</code>.",
      "Post in the <strong>GitHub Devops</strong> Teams channel:"
    ],
    teams: "PR is ready to be reviewed!\nPR: <PR link>\nTicket related: <Ticket link>",
    nextLabel: "Federico reviewed — what next?",
    nextNode: "qa_review"
  },

  /* ---------- 5. QA REVIEW (Federico) ---------- */
  qa_review: {
    type: "question",
    label: "Federico's review",
    text: "Did Federico approve or request changes?",
    cols: 2,
    options: [
      { label: "📝  Requested changes", crumb: "Changes requested", next: "qa_changes" },
      { label: "✅  Approved", crumb: "Approved", next: "deploy_qa" }
    ]
  },
  qa_changes: {
    type: "result",
    color: "dev",
    pills: [["owner-dev","Owner: Dev"]],
    title: "Apply changes — open a NEW PR",
    desc: "Don't reuse the previous PR. The flow is: feature → re-validate sandbox → merge into QA-deploy → new PR.",
    checklist: [
      "Make the changes on <code>feature/GBC-XXXX</code> (NEVER directly on QA-deploy).",
      "Push and verify the sandbox deploy + tests are green again.",
      "Merge <code>feature/GBC-XXXX</code> into <code>QA-deploy/GBC-XXXX</code>.",
      "Open a <strong>new</strong> PR: <code>QA-deploy/GBC-XXXX</code> → <code>QA</code>.",
      "Reassign to Federico, status <code>PR Request</code>, post in Teams again."
    ],
    nextLabel: "Federico re-reviewed",
    nextNode: "qa_review"
  },
  deploy_qa: {
    type: "result",
    color: "dev",
    pills: [["owner-dev","Owner: Dev"], ["", "Status: Ready for QA"]],
    title: "Deploy to QA & hand off",
    desc: "Federico approved the PR and reassigned the ticket to you. You merge and deploy.",
    checklist: [
      "Merge the QA PR.",
      "Watch the GitHub Action that deploys to the QA Salesforce org.",
      "Confirm the deploy actually succeeded in the QA org.",
      "Reassign the ticket to the <strong>QA tester</strong>."
    ],
    nextLabel: "QA finished testing",
    nextNode: "qa_result"
  },

  /* ---------- 6. QA RESULT ---------- */
  qa_result: {
    type: "question",
    label: "QA result",
    text: "Did QA find any bugs?",
    cols: 2,
    options: [
      { label: "🐞  Bugs found", crumb: "Bugs in QA", next: "qa_bugs" },
      { label: "🎉  No bugs", crumb: "Clean", next: "open_uat_pr" }
    ]
  },
  qa_bugs: {
    type: "result",
    color: "bug",
    pills: [["owner-qa","Bug tickets stay with QA"], ["owner-dev","Original ticket → Dev"]],
    title: "Bug loop (QA)",
    desc: "Bug tickets go to the QA tester (creator), NOT to the dev. Only the original story comes back to you.",
    checklist: [
      "QA creates one ADO bug ticket per issue, with the original story as <strong>parent</strong>.",
      "<strong>Bug tickets stay assigned to the QA tester (creator)</strong> — not to the dev.",
      "QA leaves a comment on the original ticket linking the bug tickets.",
      "QA moves the original ticket back to <code>Active</code> and sets the dev as owner.",
      "Dev fixes <strong>all the bugs on the same</strong> <code>feature/GBC-XXXX</code> branch — no new feature branch.",
      "Restart from the sandbox-deploy step."
    ],
    nextLabel: "Bugs fixed — push again",
    nextNode: "after_coding"
  },

  /* ---------- 7. OPEN UAT PR ---------- */
  open_uat_pr: {
    type: "result",
    color: "review",
    pills: [["owner-fk","Owner → Federico"], ["", "Status: Ready for UAT deployment → PR Request"]],
    title: "Open the UAT PR",
    desc: "Same idea as the QA PR, but against UAT.",
    checklist: [
      "Create <code>UAT-deploy/GBC-XXXX</code> from <code>feature/GBC-XXXX</code> (identical).",
      "Open PR: <code>UAT-deploy/GBC-XXXX</code> → <code>UAT</code>.",
      "Reassign the ticket to <strong>Federico Kleinman</strong>.",
      "Post in the <strong>GitHub Devops</strong> Teams channel (same template):"
    ],
    teams: "PR is ready to be reviewed!\nPR: <PR link>\nTicket related: <Ticket link>",
    nextLabel: "Federico is reviewing",
    nextNode: "uat_review"
  },

  /* ---------- 8. UAT REVIEW ---------- */
  uat_review: {
    type: "result",
    color: "review",
    pills: [["owner-fk","Owner: Federico"]],
    title: "Federico will approve, merge & route",
    desc: "Federico typically approves without changes, merges to UAT, then hands the ticket to QA for smoke. You don't need to do anything until smoke is done.",
    checklist: [
      "Federico approves and merges the UAT PR.",
      "An Action delta-deploys to the UAT org.",
      "Federico moves the ticket to <code>UAT</code>, then reassigns it to the QA tester with status <code>Ready for Smoke testing in UAT</code>.",
      "Wait for smoke results."
    ],
    nextLabel: "Smoke testing done",
    nextNode: "after_smoke"
  },
  after_smoke: {
    type: "result",
    color: "qa",
    pills: [["owner-qa","Owner: QA"], ["owner-po","Then → Jesse"]],
    title: "QA hands off to Jesse",
    desc: "QA finishes smoke and routes to the Product Owner.",
    checklist: [
      "QA assigns the ticket to <strong>Jesse</strong>.",
      "Status moves to <code>Ready for UAT</code>.",
      "Jesse runs UAT himself or assigns it to someone else."
    ],
    nextLabel: "UAT acceptance result?",
    nextNode: "uat_acceptance"
  },

  /* ---------- 9. UAT ACCEPTANCE ---------- */
  uat_acceptance: {
    type: "question",
    label: "UAT acceptance",
    text: "Did UAT find any bugs?",
    cols: 2,
    options: [
      { label: "🐞  Bugs found in UAT", crumb: "Bugs in UAT", next: "uat_bugs" },
      { label: "🎉  Accepted — ready to ship", crumb: "Accepted", next: "ship" }
    ]
  },
  uat_bugs: {
    type: "result",
    color: "bug",
    pills: [["owner-qa","Bug tickets stay with creator"], ["owner-dev","Original ticket → Dev"]],
    title: "Bug loop (UAT)",
    desc: "Same procedure as QA bugs.",
    checklist: [
      "Bug tickets are created with the original story as parent and stay assigned to the creator (QA / Jesse / whoever found them) — NOT the dev.",
      "Comment on the original ticket with the links to the bug tickets.",
      "Original ticket goes back to <code>Active</code>; dev becomes owner.",
      "Dev fixes on the same <code>feature/GBC-XXXX</code> and restarts from sandbox-deploy."
    ],
    nextLabel: "Push the fixes",
    nextNode: "after_coding"
  },
  ship: {
    type: "result",
    color: "done",
    pills: [["owner-fk","Owner → Federico"], ["", "Status: Deploy"]],
    title: "Hand off to Federico for production deploy",
    desc: "From here, Federico drives the production deploy. You're done.",
    checklist: [
      "Move the ticket to <code>Deploy</code> and assign to <strong>Federico Kleinman</strong>.",
      "Federico will merge <code>feature/GBC-XXXX</code> → <code>PreProd</code>.",
      "Federico will then promote <code>PreProd</code> → <code>main</code> (production)."
    ],
    nextLabel: "Start a new ticket",
    nextNode: "start"
  },

  /* ---------- DEPLOY ACTION FAILED ---------- */
  deploy_action_failed: {
    type: "result",
    color: "bug",
    pills: [["owner-fk","Loop in Federico"], ["", "Do NOT push another delta fix"]],
    title: "QA/UAT deploy Action failed — coordinate a full deploy with Federico",
    desc: "This is a known sharp edge of the current delta-based pipeline. Stop and read the why-box before doing anything else.",
    note: "<span class='note-label'>Why this is dangerous</span>sgd builds the delta package against the previous merge commit. Once your branch is merged into <code>QA</code> / <code>UAT</code> in git, the next delta run treats those changes as 'already deployed' — even though the Action failed and Salesforce never received them. If you just patch the symptom (fix a test, push to feature, merge again), the new delta will only contain your latest patch and the previous changes stay orphaned in git, never deployed. The org will silently drift from what's in main.",
    checklist: [
      "Open the failed Action and read the logs to understand <strong>why</strong> the deploy failed (test failure, missing dependency, metadata error, profile/permission issue, etc.).",
      "Fix the underlying problem on <code>feature/GBC-XXXX</code> first (don't open a PR yet).",
      "Ping <strong>Federico</strong> in Teams. Tell him which ticket and which Action run failed.",
      "Coordinate a <strong>full deploy via SF CLI</strong> (not a delta) to the affected org so Salesforce catches up with everything that's currently in <code>QA</code> / <code>UAT</code> in git.",
      "Only after the full deploy is green, resume the normal delta flow (open a new QA-deploy / UAT-deploy PR for any remaining fixes)."
    ],
    nextLabel: "Full deploy succeeded — back to normal flow",
    nextNode: "start"
  },

  /* ---------- BUG LOOP shortcut ---------- */
  bug_loop: {
    type: "question",
    label: "Bug source",
    text: "Where was the bug found?",
    cols: 2,
    options: [
      { label: "🧪  In QA testing", crumb: "QA bug", next: "qa_bugs" },
      { label: "🌫️  In UAT smoke or acceptance", crumb: "UAT bug", next: "uat_bugs" }
    ]
  }
};

/* ===========================================================
   Renderer + history
   =========================================================== */

const stage = document.getElementById("stage");
const breadcrumbEl = document.getElementById("breadcrumb");
const backBtn = document.getElementById("back-btn");
const restartBtn = document.getElementById("restart-btn");

let history = [{ node: "start", crumb: "Start" }];

function render() {
  const current = history[history.length - 1];
  const node = TREE[current.node];
  stage.innerHTML = "";
  renderBreadcrumb();
  backBtn.disabled = history.length <= 1;

  if (!node) return;

  if (node.type === "question") {
    stage.appendChild(renderQuestion(node));
  } else {
    stage.appendChild(renderResult(node));
  }
}

function renderBreadcrumb() {
  breadcrumbEl.innerHTML = "";
  history.forEach((h, i) => {
    const crumb = document.createElement("span");
    crumb.className = "crumb";
    crumb.textContent = h.crumb;
    breadcrumbEl.appendChild(crumb);
    if (i < history.length - 1) {
      const sep = document.createElement("span");
      sep.className = "crumb-sep";
      sep.textContent = "›";
      breadcrumbEl.appendChild(sep);
    }
  });
}

function renderQuestion(node) {
  const wrap = document.createElement("div");
  wrap.className = "question";
  wrap.innerHTML = `
    <div class="q-label">Question</div>
    <h2 class="q-text">${escapeHtml(node.text)}</h2>
    <div class="options ${node.cols === 2 ? 'cols-2' : ''}"></div>
  `;
  const opts = wrap.querySelector(".options");
  node.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = `<span>${escapeHtml(opt.label)}</span><span class="arrow">→</span>`;
    btn.addEventListener("click", () => {
      history.push({ node: opt.next, crumb: opt.crumb });
      render();
    });
    opts.appendChild(btn);
  });
  return wrap;
}

function renderResult(node) {
  const wrap = document.createElement("div");
  wrap.className = `result ${node.color || ""}`;

  let pillsHtml = "";
  if (node.pills) {
    pillsHtml = `<div class="r-meta">${node.pills.map(p => `<span class="pill ${p[0]}">${escapeHtml(p[1])}</span>`).join("")}</div>`;
  }

  let checklistHtml = "";
  if (node.checklist) {
    checklistHtml = `<ul class="checklist">${node.checklist.map(li => `<li>${li}</li>`).join("")}</ul>`;
  }

  let teamsHtml = "";
  if (node.teams) {
    teamsHtml = `<div class="teams">${escapeHtml(node.teams)}</div>`;
  }

  let noteHtml = "";
  if (node.note) {
    noteHtml = `<div class="note">${node.note}</div>`;
  }

  let nextHtml = "";
  if (node.nextNode) {
    nextHtml = `<div class="next-q"><button class="btn-primary" data-next="${node.nextNode}">${escapeHtml(node.nextLabel || "Next")} →</button></div>`;
  }

  wrap.innerHTML = `
    ${pillsHtml}
    <h2 class="r-title">${escapeHtml(node.title)}</h2>
    <div class="r-desc">${escapeHtml(node.desc || "")}</div>
    ${noteHtml}
    ${checklistHtml}
    ${teamsHtml}
    ${nextHtml}
  `;

  const btn = wrap.querySelector(".btn-primary");
  if (btn) {
    btn.addEventListener("click", () => {
      const target = TREE[node.nextNode];
      const crumb = target && target.label ? target.label : (node.nextLabel || "Next");
      history.push({ node: node.nextNode, crumb });
      render();
    });
  }
  return wrap;
}

function escapeHtml(str) {
  // allow inline <code>, <strong>, <em> in checklist items, but escape angle brackets in plain texts
  return str;
}

backBtn.addEventListener("click", () => {
  if (history.length > 1) {
    history.pop();
    render();
  }
});
restartBtn.addEventListener("click", () => {
  history = [{ node: "start", crumb: "Start" }];
  render();
});

render();
</script>
</body>
</html>
